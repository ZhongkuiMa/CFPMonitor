name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'data/metadata/**'
      - 'data/structured/**'
      - 'src/site/**'
      - 'docs/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install "pyyaml>=6.0.3" "jinja2>=3.1.6" "beautifulsoup4>=4.14.0" "requests>=2.32.0"
      - run: pip install -e . --no-deps
      - run: python cfpmonitor.py build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
