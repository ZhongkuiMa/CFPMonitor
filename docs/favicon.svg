<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>

  <!-- Document/Paper icon -->
  <rect x="30" y="25" width="35" height="45" rx="2" fill="white" opacity="0.95"/>

  <!-- Lines representing text -->
  <line x1="35" y1="33" x2="55" y2="33" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="40" x2="60" y2="40" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="47" x2="58" y2="47" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>

  <!-- Checkmark -->
  <polyline points="38,58 43,63 57,50" fill="none" stroke="#764ba2" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Monitor/Screen outline -->
  <rect x="20" y="20" width="60" height="55" rx="3" fill="none" stroke="white" stroke-width="2.5" opacity="0.6"/>
</svg>
